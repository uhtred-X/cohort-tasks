<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleX Insights & Blogs</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <a class="brand" href="#">
            <img src="logo.png" alt="site-logo">
            <span>ScaleX</span>
        </a>

        <nav class="main-nav">
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Blogs</a>
            <a href="#">Contact Us</a>
        </nav>

        <a class="cta" href="#">Get Started</a>
    </header>
    <main>
        <section class="hero">
            <h1 class="hero-title">Insights & Blogs</h1>
            <div class="filters">
                <a class="filter active">All</a>
                <a class="filter">Tech</a>
                <a class="filter">SaaS</a>
                <a class="filter">Marketing</a>
            </div>
        </section>
        <section class="blog-grid">
            <div class="card-content">

                <img src="./images/tech.jpg" alt="Tech Image">
                <span class="tag">Tech</span>
                <h2>The Ultimate Guide To SaaS Marketing</h2>
                <time datetime="2025-05-23">May 23, 2025</time>

                <span class="tag">SaaS</span>
                <h2>5 Key Trends In SaaS Growth For 2025</h2>
                <time datetime="2025-05-23">May 23, 2025</time>
            </div>
            <div class="card-content">

                <img src="./images/marketing.jpg" alt="Marketing Image">
                <span class="tag">Marketing</span>
                <h2>How Data-Driven Strategies Are Important</h2>
                <time datetime="2025-05-23">May 23, 2025</time>
