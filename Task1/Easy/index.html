<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokémon – Gen I</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page">

  <!-- LEFT -->
  <section class="left">

    <div class="logo">
      <img src="images/logo.png" alt="Pokemon Logo">
    </div>

    <p class="gen-label">Pokemon Gen I</p>

    <h1 class="pokemon-name">Pikachu</h1>

    <p class="pokemon-desc">
      Pikachu is an Electric-type Pokémon introduced in Generation I.
      Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
    </p>

    <div class="counter">
      <span class="counter-line"></span>
      <span class="counter-text">01 / 08</span>
    </div>
    <img class="pokeball-bg" src="images/pokeball.png" alt="Pokeball">

  </section>

  <!-- RIGHT -->
  <section class="right">

    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

  </section>

  <!-- CENTER IMAGE -->
  <div class="pokemon-img">
    <img src="images/pikachu.png" alt="Pikachu">
  </div>

</div>

</body>
</html>
