<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Work Cards</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="art-section">
    <div class="top-bar">
      <h2>Explore Art Work</h2>
      <a href="#">See All</a>
    </div>

    <div class="card-wrapper">

      <div class="card">
        
        <img src="images/img1.jpg" alt="Monocular">

        <div class="card-info">
          <div class="text">
            <h3>Monocular</h3>
            <span>54.8k ♡</span>
          </div>

          <button>Place Bid</button>
        </div>
      </div>


      <div class="card">
        <img src="images/img2.jpg" alt="Horns Mask">

        <div class="card-info">
          <div class="text">
            <h3>Horns Mask</h3>
            <span>32.4k ♡</span>
          </div>

          <button>Place Bid</button>
        </div>
      </div>


      <div class="card">
        <img src="images/img3.jpeg" alt="Light Moon">

        <div class="card-info">
          <div class="text">
            <h3>Light Moon</h3>
            <span>86.8k ♡</span>
          </div>

          <button>Place Bid</button>
        </div>
      </div>


      <div class="card">
        <img src="images/img4.jpg" alt="Skull Wire">

        <div class="card-info">
          <div class="text">
            <h3>Skull Wire</h3>
            <span>78.9k ♡</span>
          </div>

          <button>Place Bid</button>
        </div>
      </div>


      <div class="card">
        <img src="images/img5.jpg" alt="Spiderman">

        <div class="card-info">
          <div class="text">
            <h3>Spiderman</h3>
            <span>24.8k ♡</span>
          </div>

          <button>Place Bid</button>
        </div>
      </div>


      <div class="card">
        <img src="images/img6.jpg" alt="DeadPool">

        <div class="card-info">
          <div class="text">
            <h3>DeadPool</h3>
            <span>59.7k ♡</span>
          </div>

          <button>Place Bid</button>
        </div>
      </div>


      <div class="card">
        <img src="images/img7.jpg" alt="White Eye">

        <div class="card-info">
          <div class="text">
            <h3>White Eye</h3>
            <span>45.7k ♡</span>
          </div>

          <button>Place Bid</button>
        </div>
      </div>


      <div class="card">
        <img src="images/img8.jpg" alt="Plastic Spinal">

        <div class="card-info">
          <div class="text">
            <h3>Plastic Spinal</h3>
            <span>98.6k ♡</span>
          </div>

          <button>Place Bid</button>
        </div>
      </div>

    </div>

  </section>

</body>
</html>
